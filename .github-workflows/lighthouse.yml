# Lighthouse CI (mobile thresholds) â€” Task 5.1.9
#
# Advisory job per `Planning/testing-strategy.md Â§2.8` and `design-doc.md Â§13`.
# Threshold violations surface as failed CI status on this job + an artifact
# upload, but `continue-on-error: true` keeps the gate non-blocking for the PR.
# The threshold assertions live in `lighthouserc.json` (mobile form factor, 4
# categories: Perf >= 0.90, A11y/BP >= 0.95, SEO >= 0.90). The PWA category
# and `installable-manifest` audit were retired upstream in Lighthouse 12 and
# are no longer asserted. Removal of `continue-on-error: true` is tracked as
# `F-LHCI-CONTINUE-ON-ERROR-HARDEN-5.1.9` in `Planning/followups.md`.
#
# AC4 caveat (RF4 â€” see `Planning/followups.md` entry
# `F-TEST-4-LHCI-AUTH-COVERAGE-5.1.9`):
#   Until F-TEST-4 #1 (real-test-user auth fixture) lands, the four "authed"
#   URLs in the audit set (`/dashboard`, `/log`, `/library`, `/progress`) all
#   redirect to `/login` because the LHCI runner is unauthenticated. Lighthouse
#   therefore measures the login page for those URLs, NOT the actual authed
#   surfaces. The `/login` URL measurements are valid; the four authed-route
#   measurements are login-redirect proxies. Once F-TEST-4 #1 ships
#   (Task 5.1.10 / Phase 5.2),
#   replace the bare URLs in the `lhci autorun` step below with an authed
#   collect strategy (e.g. `puppeteerScript` that performs login, or a
#   `wait-for` that waits past the redirect) to lift the caveat.
#
# Why a separate workflow file (not a job in `ci.yml`):
#   - Matches `Planning/tasks.md` L1796 file naming.
#   - Decouples from `ci.yml`'s pre-existing red `unit-integration` chain
#     (missing `SUPABASE_PAT` + `SUPABASE_PROJECT_REF` secrets â€” owned by
#     Task 5.1.10).
#   - Independent concurrency group prevents lighthouse from blocking or
#     being blocked by other CI lanes.
#
# Vercel SSO bypass (Codex Round 2 hardening):
#   Hobby tier protects preview URLs by default. The runner pre-authenticates
#   via the `puppeteerScript` hook in `lighthouserc.json` (see
#   `scripts/lhci-vercel-bypass.js`) which visits Vercel's bypass-cookie URL
#   ONCE per LHCI session. Vercel responds with a `_vercel_jwt` cookie
#   (Secure / SameSite=None / HttpOnly); subsequent audits reuse that cookie.
#   Advantages over Round 1's `extraHeaders` approach:
#     1. Bypass token never appears in audited request logs / report HTML â€”
#        the cookie-set request happens BEFORE LHCI begins capturing the
#        target URLs.
#     2. No header collision risk on routes that already set headers.
#     3. Cookie auth survives the same-origin policy without extra config.
#   `--collect.url` reverts to clean URLs (no query params, no header flag).
#   Public-storage upload remains disabled (`upload.target: filesystem`); GH
#   private artifact upload is the only report sink.
#   Production (`https://kalori-one.vercel.app`) is public, no bypass needed
#   on `main` push â€” `LHCI_VERCEL_BASE_URL` stays empty and the puppeteer
#   script no-ops gracefully.

name: Lighthouse CI (mobile)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20

jobs:
  lighthouse:
    name: Lighthouse CI (mobile, advisory)
    runs-on: ubuntu-latest
    # Advisory per testing-strategy.md Â§2.8 â€” surfaces threshold violations
    # without blocking merge. Threshold assertions live in lighthouserc.json.
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # PR path: wait for the auto-deployed Vercel preview, then audit it.
      - name: Wait for Vercel Preview (PR only)
        id: vercel-preview
        if: github.event_name == 'pull_request'
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 600

      - name: Resolve target URL
        id: target
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ steps.vercel-preview.outputs.url }}"
          else
            BASE="https://kalori-one.vercel.app"
          fi
          # Clean URLs â€” SSO bypass is performed via `puppeteerScript` hook in
          # `lighthouserc.json` (see `scripts/lhci-vercel-bypass.js`) which sets
          # the `_vercel_jwt` cookie before audits begin. No headers, no query
          # params, no token in any audited request URL.
          echo "base=${BASE}" >> "$GITHUB_OUTPUT"

      - name: Lighthouse CI
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}
          LHCI_BUILD_CONTEXT__GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # LHCI_GITHUB_APP_TOKEN is OPTIONAL (status-check integration). Leave
          # commented unless the maintainer registers the LHCI GitHub App.
          # LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          # SSO bypass cookie set by `scripts/lhci-vercel-bypass.js` via
          # `puppeteerScript` hook. Both env vars are read by the script:
          #   - VERCEL_AUTOMATION_BYPASS_SECRET: empty on `main` push (no
          #     bypass needed; production is public). Script no-ops.
          #   - LHCI_VERCEL_BASE_URL: target preview / production URL. Empty
          #     on main push if the production host isn't propagated; script
          #     no-ops.
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          LHCI_VERCEL_BASE_URL: ${{ steps.target.outputs.base }}
        run: |
          pnpm exec lhci autorun \
            --collect.url="${{ steps.target.outputs.base }}/dashboard" \
            --collect.url="${{ steps.target.outputs.base }}/log" \
            --collect.url="${{ steps.target.outputs.base }}/library" \
            --collect.url="${{ steps.target.outputs.base }}/progress" \
            --collect.url="${{ steps.target.outputs.base }}/login"

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 14
